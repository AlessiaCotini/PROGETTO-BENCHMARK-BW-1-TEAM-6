<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Feedback</title>
    <link rel="stylesheet" href="./css/reset.css" />
    <link rel="stylesheet" href="./css/normalize.css" />
    <link rel="stylesheet" href="./css/style-feedback.css" />
  </head>
  <body>
    <header>
      <img src="./assets/epicode_logo.png" alt="epicode_logo" />
    </header>
    <main>
      <section>
        <h1>Tell us how did it go</h1>
        <p>
          From 0 to 10, how likely are you to reccomed this songs quiz to a
          friend?
        </p>
      </section>
      <section id="iconsContainer"></section>
    </main>
    <footer>
      <form id="open-feedback">
        <label for="input-feedback"
          >Leave us an open feedback about your experience with our quiz.</label
        >
        <input
          type="text"
          placeholder="Write your comment here"
          id="input-feedback"
        />
        <button id="button-feedback">Submit</button>
      </form>
    </footer>
    <script src="./script/feedback_page.js"></script>
  </body>
</html>
