<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Feedback</title>
    <link rel="stylesheet" href="./css/reset.css" />
    <link rel="stylesheet" href="./css/normalize.css" />
    <link rel="stylesheet" href="./css/style-feedback.css" />
    <link rel="icon" type="png" href="./assets/favicon2.png" />
  </head>
  <body>
    <header>
      <a href="index.html">
        <img src="./assets/epicode_logo.png" alt="logoepic"
      /></a>
    </header>
    <main>
      <section class="title">
        <h1>Tell us how did it go</h1>
        <p>
          From 0 to 10, how likely are you to reccomed this songs quiz to a
          friend?
        </p>
      </section>
      <section id="iconsContainer"></section>
    </main>
    <footer>
      <h3>Leave us an open feedback about your experience with our quiz.</h3>
      <form action="credits.html" id="open-feedback">
        <input
          type="text"
          placeholder="Write your comment here"
          id="input-feedback"
        />
        <br />
        <button class="animated-button">
          <span>MORE INFO</span> <span></span>
        </button>
      </form>
    </footer>
    <script src="./script/feedback.js"></script>
  </body>
</html>
