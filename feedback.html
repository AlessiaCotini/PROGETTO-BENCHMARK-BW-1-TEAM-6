<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Feedback</title>
    <link rel="stylesheet" href="./css/reset.css" />
    <link rel="stylesheet" href="./css/normalize.css" />
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <header>
      <img src="./assets/epicode_logo.png" alt="epicode_logo" />
    </header>
    <main>
      <section>
        <h1>Tell us how did it go</h1>
        <p>
          From 0 to 10, how likely are you to reccomed this songs quiz to a
          friend?
        </p>
      </section>
      <section id="iconsContainer">
        <img class="stars" src="./assets/star.svg" alt="star" />
        <img class="stars" src="./assets/star.svg" alt="star" />
        <img class="stars" src="./assets/star.svg" alt="star" />
        <img class="stars" src="./assets/star.svg" alt="star" />
        <img class="stars" src="./assets/star.svg" alt="star" />
        <img class="stars" src="./assets/star.svg" alt="star" />
        <img class="stars" src="./assets/star.svg" alt="star" />
        <img class="stars" src="./assets/star.svg" alt="star" />
        <img class="stars" src="./assets/star.svg" alt="star" />
        <img class="stars" src="./assets/star.svg" alt="star" />
      </section>
    </main>
    <footer>
      <form>
        <p>Leave us an open feedback about your experience with our quiz.</p>
        <input type="text" placeholder="Write your comment here" />
        <button>Submit</button>
      </form>
    </footer>
    <script src="logica.js"></script>
  </body>
</html>
