<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz Results!</title>
    <link rel="stylesheet" href="./css/reset.css" />
    <link rel="stylesheet" href="./css/normalize.css" />
    <link rel="stylesheet" href="./css/style-results.css" />
    <link rel="icon" type="png" href="./assets/favicon2.png" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css"
      integrity="sha512-1ycn6IcaQQ40/MKBW2W4Rhis/DbILU74C1vSrLJxCq57o941Ym01SwNsOMqvEBFlcgUa6xLiPY/NS5R+E6ztJQ=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <header>
      <a href="welcome.html">
        <img src="./assets/epicode_logo.png" alt="logoepic"
      /></a>
    </header>
    <main>
      <section id="title">
        <h1>Results</h1>
        <p>The summary of your answers:</p>
      </section>
      <div>
        <section class="inline" id="correct"></section>
        <canvas id="cakeResult"></canvas>
        <section class="inline" id="wrong"></section>
      </div>
      <div><p id="resultsId"></p></div>
    </main>
    <footer>
      <form action="feedback.html">
        <button class="animated-button">
          <span>RATE US!</span> <span></span>
        </button>
      </form>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="./script/cake.js"></script>
  </body>
</html>
