<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz.com</title>
    <link rel="stylesheet" href="./css/reset.css" />
    <link rel="stylesheet" href="./css/normalize.css" />
    <link rel="stylesheet" href="./css/style-quiz.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css"
      integrity="sha512-1ycn6IcaQQ40/MKBW2W4Rhis/DbILU74C1vSrLJxCq57o941Ym01SwNsOMqvEBFlcgUa6xLiPY/NS5R+E6ztJQ=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="icon" type="png" href="./assets/favicon2.png" />
  </head>
  <body>
    <header>
      <a href="welcome.html">
        <img src="./assets/epicode_logo.png" alt="logoepic"
      /></a>
      <section id="timerContainer" class="timer-wrapper">
        <svg width="120" height="120">
          <circle
            cx="60"
            cy="60"
            r="50"
            stroke="#ddd"
            stroke-width="8"
            fill="none"
          />

          <circle
            id="progressCircle"
            cx="60"
            cy="60"
            r="50"
            stroke="#00FFFF"
            stroke-width="8"
            fill="none"
            stroke-linecap="round"
            transform="rotate(-90 60 60)"
          />
        </svg>

        <div id="timerText">30</div>
      </section>
    </header>
    <main>
      <h1 id="readyTitle">Ready, Set...</h1>
      <form id="difficultMode">
        <input type="checkbox" id="easyMode" />
        <label for="easyMode" class="difficulty-label">Easy Mode</label>

        <input type="checkbox" id="hardMode" />
        <label for="hardMode" class="difficulty-label">Hard Mode</label>
      </form>
      <section id="questionContainer">
        <audio src="" id="songsId"></audio>
        <div class="audio-controls">
          <button class="player" id="playBtn">
            <i class="fas fa-play-circle"></i>
          </button>
          <button class="player" id="pauseBtn">
            <i class="fas fa-pause-circle"></i>
          </button>
          <progress id="seekbar" value="0" max="100"></progress>
        </div>
      </section>
      <form action="results.html">
        <button id="nextButton">Next</button>
      </form>
    </main>
    <footer id="footer"></footer>
    <script src="./script/quiz.js"></script>
  </body>
</html>
