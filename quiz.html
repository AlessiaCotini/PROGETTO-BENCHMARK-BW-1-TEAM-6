<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz.com</title>
    <link rel="stylesheet" href="./css/reset.css" />
    <link rel="stylesheet" href="./css/normalize.css" />
    <link rel="stylesheet" href="./css/style-quiz.css" />
  </head>
  <body>
    <header>
      <a href="welcome.html">
        <img src="./assets/epicode_logo.png" alt="logoepic"
      /></a>
      <section id="timerContainer" class="timer-wrapper">
        <svg width="120" height="120">
          <circle
            cx="60"
            cy="60"
            r="50"
            stroke="#ddd"
            stroke-width="8"
            fill="none"
          />

          <circle
            id="progressCircle"
            cx="60"
            cy="60"
            r="50"
            stroke="#00FFFF"
            stroke-width="8"
            fill="none"
            stroke-linecap="round"
            transform="rotate(-90 60 60)"
          />
        </svg>

        <div id="timerText">30</div>
      </section>
    </header>
    <main>
      <h1 id="readyTitle">Are you ready?</h1>
      <section id="questionContainer">
        <audio src="" id="songsId"></audio>
      </section>
    </main>
    <footer id="footer">
      <form action="results.html">
        <button id="nextButton">Next</button>
      </form>
    </footer>
    <script src="./script/quiz.js"></script>
  </body>
</html>
